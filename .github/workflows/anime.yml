name: animeverse

on:
  push

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Cleaning Maven target
        run: mvn clean
      - name: Running unit tests
        run: mvn test
      - name: Compile the java code and package JAR
        run: mvn -B compile package
      

