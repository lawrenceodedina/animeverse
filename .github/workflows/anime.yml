name: animeverse

on:
  push

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cleaning Maven target
        run: mvn clean

      - name: Running unit tests
        run: mvn test

      - name: Compile the java code and package JAR
        run: mvn -Dmaven.test.skip=true -B compile package

      - name: Docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        
      - name: Copy jar file into dockerfile and push to docker registry
        uses: docker/build-push-action@v7
        with:
          push: true
          context: .
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/animeverse:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/animeverse:${{github.run_number}}